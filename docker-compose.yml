services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vaults_user
      POSTGRES_PASSWORD: VaultsPass2024
      POSTGRES_DB: vaults_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaults_user -d vaults_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: